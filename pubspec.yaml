name: flutter_application_1
description: Flodo AI Take-Home — Full-Stack Task Management App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client to talk to FastAPI backend
  http: ^1.2.1

  # Draft persistence (SharedPreferences)
  shared_preferences: ^2.2.3

  # Date formatting
  intl: ^0.19.0

  # Beautiful fonts
  google_fonts: ^6.2.1

  # Smooth animations
  flutter_animate: ^4.5.0

  # Unique IDs (generated client-side for optimistic UX)
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
